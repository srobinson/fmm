name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      - name: Build (release)
        run: cargo build --release

      - name: Check generated docs are in sync with tools.toml
        run: |
          cargo build
          git diff --exit-code \
            src/mcp/generated_schema.rs \
            src/cli/generated_help.rs \
            templates/SKILL.md || \
            (echo "ERROR: Generated docs are out of sync with tools.toml." \
                  "Run 'cargo build' and commit the generated files." && exit 1)
