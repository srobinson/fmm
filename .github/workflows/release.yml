name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_npm_only:
        description: Publish only the npm package from the current main package.json
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  # Opt JavaScript actions still targeting Node 20 (upload-artifact@v5,
  # download-artifact@v5, release-please-action@v4) into Node 24 ahead of
  # the 2026-06-02 runner-enforced deprecation.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.publish_npm_only }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.HELIOY_PAT }}

      - name: Auto-merge release PR
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ secrets.HELIOY_PAT }}
          PR_NUMBER: ${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).number || '' }}
        run: gh pr merge --auto --squash "$PR_NUMBER" --repo "${{ github.repository }}"

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p fmm

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../fmm-${{ matrix.target }}.tar.gz fmm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path fmm.exe -DestinationPath ../../../fmm-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: fmm-${{ matrix.target }}
          path: fmm-${{ matrix.target }}.*

  upload-assets:
    needs: [release-please, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum fmm-* > sha256sums.txt

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" artifacts/* --repo "${{ github.repository }}"

  publish-npm:
    needs: [release-please, upload-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish npm packages
        run: bash .github/scripts/publish-npm.sh npm/frontmatter-matters

  publish-npm-manual:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_npm_only }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish npm packages
        run: bash .github/scripts/publish-npm.sh npm/frontmatter-matters
