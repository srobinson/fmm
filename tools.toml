# Single source of truth for all tool documentation.
# build.rs reads this file and generates:
#   src/mcp/generated_schema.rs  — MCP tool list JSON
#   src/cli/generated_help.rs    — CLI help string constants
#   templates/SKILL.md           — Claude Code skill documentation

[skill]
workflow = """
## Navigation Workflow

1. **Orient** — `fmm_list_files(sort_by: "downstream")` — highest blast-radius files first. Start here before touching anything.
2. **Locate** — `fmm_lookup_export("SymbolName")` — O(1) file + line range. Replaces grep.
3. **Outline** — `fmm_file_outline(file, include_private: true)` — full method inventory including private members.
4. **Read** — `fmm_read_symbol("Class.method", line_numbers: true)` — surgical extraction.
5. **Impact** — `fmm_glossary("Class.method")` — confirmed callers before renaming or changing a signature.

### Discovering Code Structure

```
fmm_list_files(sort_by: "downstream")   →  highest blast-radius first
fmm_list_files(group_by: "subdir")      →  directory topology in one call
fmm_list_files(filter: "source")        →  source files only (no tests)
fmm_list_files(pattern: "*.ts")         →  filter by filename glob
```

### Finding a Symbol

```
fmm_lookup_export("SymbolName")         →  O(1) file + line range
fmm_list_exports(pattern: "auth")       →  fuzzy: validateAuth, authMiddleware
fmm_file_outline(file: "src/foo.ts")    →  all exports with line ranges
fmm_file_outline(..., include_private: true)  →  private members too
```

### Reading Code

```
fmm_read_symbol("ClassName")            →  full class source (capped at 10KB)
fmm_read_symbol("Class.method")         →  single method — surgical extraction
fmm_read_symbol("Symbol", line_numbers: true)  →  with absolute line numbers
fmm_read_symbol("LargeClass", truncate: false) →  bypass 10KB cap
```

### Impact Analysis

```
fmm_glossary("loadInstance")                    →  all callers (named-import precision)
fmm_glossary("Injector.loadInstance")           →  call-site precision
fmm_dependency_graph(file: "src/injector.ts")   →  upstream deps + downstream blast radius
fmm_dependency_graph(..., filter: "source")     →  production blast radius (no tests)
fmm_dependency_graph(..., depth: -1)            →  full transitive closure
```

### Searching

```
fmm_search(term: "store")                       →  smart search: exports, files, imports
fmm_search(imports: "lodash", min_loc: 100)     →  structured AND query
fmm_search(export: "createStore", min_loc: 50)  →  export + size filter
fmm_search(depends_on: "src/auth.ts")           →  full blast radius (transitive)
```

## Navigation Protocol

### "Orient me / What's in this directory?"

```
1. fmm_list_files(directory: "packages/core/", sort_by: "loc") → largest files first
2. Top entries = complexity anchors. Use fmm_file_outline on those first.
```

First tool to reach for in an unknown codebase. Default sort is `loc` (heaviest files first).

**Sort modes:** `loc` (default, heaviest files), `downstream` (most-imported — best before a refactor to see blast radius), `exports` (most exported symbols), `name` (alphabetical), `modified` (recently changed).

**Pre-refactoring:** use `sort_by: "downstream"` to find the files other files depend on most. Those are the highest-risk targets for changes.

### "What's in this file?"

```
1. fmm_file_outline(file: "src/foo.ts") → every export + public methods with line ranges
2. Decide WHAT to read before reading anything
```

`fmm_file_outline` lists all public methods on classes with exact line ranges. For a 1,000-line class, you see the full table of contents in one call.

### "Where is X defined?"

```
1. fmm_lookup_export(name: "X") → file, line range, AND full file profile — DONE
2. Not found? → fmm_list_exports(pattern: "X") for fuzzy match
3. Still nothing? → fall back to Grep
```

`fmm_lookup_export` returns more than a location — the entire file's export map, imports, and dependency list come with it.

### "Show me the code for X"

```
1. fmm_read_symbol(name: "ClassName.methodName") → exact method source — DONE
   Full class: fmm_read_symbol(name: "ClassName") — truncates at 10KB; add truncate: false for full source
```

**Always use `ClassName.method` notation for large classes.** It extracts exactly that method — no class body noise. Reading a 1,000-line class to find an 80-line method wastes ~90% of your token budget.

### "Find everything named like X"

```
1. fmm_list_exports(pattern: "X") → all matching exports with file + line range
2. Scope: fmm_list_exports(pattern: "X", directory: "packages/core/")
```

Results include class methods (e.g., `Injector.loadInstance`) as distinct entries. Use `offset` to paginate wide searches.

### "Cross-cutting query: files using X with more than N lines"

```
1. fmm_search(imports: "rxjs", min_loc: 500) → files matching ALL criteria with full metadata
2. fmm_search(depends_on: "src/core/injector.ts") → all files in the transitive dependency chain
3. fmm_search(term: "Injector") → EXPORTS + FILES + IMPORTS grouped by type
```

`depends_on` uses **transitive** matching — it returns the full downstream closure, not just direct importers. For direct importers only, use `fmm_dependency_graph(depth: 1)` and read `downstream`.

### "What would break if I rename/change X?"

```
1. fmm_glossary(pattern: "ClassName.method") → actual call sites only — surgical blast radius
   fmm_glossary(pattern: "ClassName") → file-level: all files importing the class's file
2. Separate production vs test impact: mode: "source" | "tests" | "all"
```

**The dotted pattern is the contract.** `fmm_glossary(pattern: "loadInstance")` returns every file that imports `injector.ts` — a superset. `fmm_glossary(pattern: "Injector.loadInstance")` runs a tree-sitter second pass and returns only files with an actual call site. Use the dotted form for rename safety.

### "What tests cover X?"

```
1. fmm_glossary(pattern: "ClassName.method", mode: "tests") → test files with actual call sites
   fmm_glossary(pattern: "ClassName", mode: "tests") → all test files importing the class
```

### "What depends on this file? What does it import?"

```
1. fmm_dependency_graph(file: "src/foo.ts")
   - local_deps: intra-project imports, resolved to actual paths
   - external: third-party packages
   - downstream: files that import this file (complete and reliable)
2. Transitive: fmm_dependency_graph(file: "...", depth: 3) or depth: -1 for full closure
```

### "Evaluate or audit this codebase"

```
1. fmm_list_files(group_by: "subdir")               → full topology, LOC per bucket
2. fmm_list_files(sort_by: "loc", limit: 20)        → largest files = complexity anchors
3. fmm_list_files(sort_by: "downstream", limit: 15) → highest blast-radius files
4. fmm_file_outline on key files                    → structure without reading
5. fmm_search(imports: "package")                   → cross-cutting architecture patterns
```

A comprehensive evaluation in 5-8 calls and under 5k tokens — faster and more complete than reading files.
"""

# Tool order matches the MCP tools/list response order — do not reorder.
[tools.fmm_lookup_export]
cli_name        = "lookup"
mcp_description = "Instant O(1) symbol-to-file lookup. Find where a function, class, type, or variable is defined. Returns the file path plus metadata (exports, imports, dependencies, LOC). Use before Grep."
cli_about       = "Find which file defines a symbol and show its metadata.\n\nUses the pre-built export index for O(1) lookup. Supports plain exports, re-exports, and dotted ClassName.method notation."

[[tools.fmm_lookup_export.params]]
name            = "name"
type            = "string"
required        = true
mcp_description = "Exact export name to find (function, class, type, variable, component)"
cli_help        = "Symbol name to look up (exact match; use 'fmm exports <term>' for fuzzy)"
cli_flag        = "name"

[tools.fmm_list_exports]
cli_name        = "exports"
mcp_description = "Search or list exported symbols across the codebase. Use 'pattern' for fuzzy discovery (e.g. 'auth' matches validateAuth, authMiddleware). Patterns with regex metacharacters (^, $, [, (, \\\\, ., *, +, ?, {) are compiled as regex. Use 'directory' to scope results to a path prefix (e.g. 'packages/core/'). Use 'file' to list a specific file's exports. Default limit: 200. Use offset to page through large result sets."
cli_about       = "List exports matching a pattern across the indexed codebase.\n\nWithout a pattern, lists all exports grouped by file. Use --dir to scope results to a directory. Includes dotted method names (ClassName.method).\n\nPattern matching is auto-detected: plain strings use case-insensitive substring match; patterns with regex metacharacters (^, $, [, (, \\\\, ., *, +, ?, {) are compiled as regex."

[[tools.fmm_list_exports.params]]
name            = "pattern"
type            = "string"
mcp_description = "Pattern to match against export names. Plain strings use case-insensitive substring match (e.g. 'auth' finds validateAuth, authMiddleware). Patterns containing regex metacharacters (^, $, [, (, \\\\, ., *, +, ?, {) are compiled as regex: '^handle' = prefix match, 'Service$' = suffix match, '^[A-Z]' = PascalCase only. Invalid regex returns an error."
cli_help        = "Pattern to filter exports — substring (case-insensitive) or regex (auto-detected when metacharacters present)"
cli_flag        = "pattern"

[[tools.fmm_list_exports.params]]
name            = "file"
type            = "string"
mcp_description = "File path — returns all exports from this specific file"
cli_help        = "File path — returns all exports from this file"
cli_flag        = "--file"

[[tools.fmm_list_exports.params]]
name            = "directory"
type            = "string"
mcp_description = "Path prefix to scope results (e.g. 'packages/core/'). Only exports from files under this directory are returned."
cli_help        = "Scope results to a directory prefix (e.g. packages/core/)"
cli_flag        = "--dir"

[[tools.fmm_list_exports.params]]
name            = "limit"
type            = "integer"
mcp_description = "Maximum number of results to return (default: 200). Increase for broader listings."
cli_help        = "Maximum number of results (default: 200)"
cli_flag        = "--limit"

[[tools.fmm_list_exports.params]]
name            = "offset"
type            = "integer"
mcp_description = "Number of results to skip before returning (default: 0). Use for pagination: offset=200 returns results 201–400."
cli_help        = "Number of results to skip (default: 0) — use for pagination"
cli_flag        = "--offset"

[tools.fmm_dependency_graph]
cli_name        = "deps"
mcp_description = "Get a file's dependency graph: upstream dependencies (what it imports) and downstream dependents (what would break if it changes). Use for impact analysis and blast radius. Add depth>1 for transitive traversal; depth=-1 for full closure. Use filter='source' to exclude test files from downstream, or filter='tests' to see only test coverage."
cli_about       = "Show a file's dependency graph: local_deps (resolved local imports), external (packages), and downstream (what would break if this file changes).\n\nUse --depth for transitive traversal. depth=-1 computes the full closure.\nUse --filter=source to exclude test files from downstream for production blast-radius analysis."

[[tools.fmm_dependency_graph.params]]
name            = "file"
type            = "string"
required        = true
mcp_description = "File path to analyze — returns all upstream dependencies and downstream dependents"
cli_help        = "Source file path (relative to project root, as indexed by fmm)"
cli_flag        = "file"

[[tools.fmm_dependency_graph.params]]
name            = "depth"
type            = "integer"
mcp_description = "Traversal depth (default: 1 = direct deps only). depth=2 adds transitive deps. depth=-1 computes the full transitive closure. depth>1 returns flat lists with a depth annotation per entry."
cli_help        = "Traversal depth (1 = direct deps only, -1 = full closure)"
cli_flag        = "--depth"

[[tools.fmm_dependency_graph.params]]
name            = "filter"
type            = "string"
enum            = ["all", "source", "tests"]
mcp_description = "Filter upstream and downstream lists by file type. 'all' (default): no filtering. 'source': exclude test files (*.spec.ts, *.test.ts, /test/, etc.) — use for production blast-radius analysis. 'tests': show only test files — use for test coverage analysis."
cli_help        = "Filter upstream/downstream by file type: all (default), source (exclude tests), tests (only tests)"
cli_flag        = "--filter"

[tools.fmm_read_symbol]
cli_name        = "read"
mcp_description = "Read the source code for a specific exported symbol. Returns the exact lines where the function/class/type is defined, without reading the entire file. Requires line-range data from v0.3 sidecars. Use `ClassName.method` notation to read a specific public or private method: `fmm_read_symbol(name: \"Injector.loadInstance\")`. Private methods discovered via fmm_file_outline(include_private: true) are accessible using the same dotted notation. For large symbols (>10KB) use truncate: false to get the full source. Use line_numbers: true to prepend absolute line numbers to each source line."
cli_about       = "Read the source code of an exported symbol or a specific method.\n\nUse plain name for a top-level export, or ClassName.method notation for a specific public method. Truncates at 10KB by default; use --no-truncate for full source."

[[tools.fmm_read_symbol.params]]
name            = "name"
type            = "string"
required        = true
mcp_description = "Exact export name to read (function, class, type, component), or ClassName.method for a specific public or private method"
cli_help        = "Symbol name (or ClassName.method for a specific public method)"
cli_flag        = "name"

[[tools.fmm_read_symbol.params]]
name            = "truncate"
type            = "boolean"
mcp_description = "Whether to apply the 10KB response cap (default: true). Set to false to return the full source for large symbols that would otherwise be truncated."
cli_help        = "Return full source, bypassing the 10KB truncation cap"
cli_flag        = "--no-truncate"

[[tools.fmm_read_symbol.params]]
name            = "line_numbers"
type            = "boolean"
mcp_description = "When true, prepend absolute line numbers (right-aligned) to each source line. Useful when referencing specific lines in follow-up questions. Default: false."
cli_help        = "Prepend absolute line numbers to each source line"
cli_flag        = "--line-numbers"

[tools.fmm_file_outline]
cli_name        = "outline"
mcp_description = "Get a spatial outline of a file: every exported symbol with its line range and size. Like a table-of-contents for the file. Use to understand file structure before reading specific symbols. Set include_private: true to also show private/protected members under each class (TypeScript and Python; on-demand tree-sitter parse)."
cli_about       = "Show all exports in a file with their line ranges.\n\nUse before reading source to identify which symbol to target with 'fmm read'."

[[tools.fmm_file_outline.params]]
name            = "file"
type            = "string"
required        = true
mcp_description = "File path to outline — returns all exports with line ranges and sizes"
cli_help        = "Source file path (relative to project root)"
cli_flag        = "file"

[[tools.fmm_file_outline.params]]
name            = "include_private"
type            = "boolean"
mcp_description = "When true, include private/protected methods and fields under each class, annotated with '# private'. On-demand tree-sitter parse — no index rebuild needed. Supported: TypeScript, JavaScript, Python. Default: false."
cli_help        = "Include private/protected methods and fields under each class"
cli_flag        = "--include-private"

[tools.fmm_search]
cli_name        = "search"
mcp_description = "Universal codebase search. Use 'term' for smart search across exports, files, and imports. Use structured filters (export, imports, depends_on, LOC) for precise queries. Combine 'term' with filters to narrow results with AND semantics — only exports matching the term from files matching the filters are returned. Note: depends_on uses transitive matching (full import chain), not direct-only. For direct importers only, use fmm_dependency_graph with depth=1."
cli_about       = "Query the index — O(1) export lookup, dependency graphs, LOC filters.\n\nWith a bare term (no flags), searches across all dimensions: exports, file paths, and imports — with smart ranking. Exact export matches appear first.\n\nExport lookups use a reverse index for O(1) performance. Flags narrow the search to a single dimension and can be combined with AND logic."

[[tools.fmm_search.params]]
name            = "term"
type            = "string"
mcp_description = "Universal search term — searches exports (exact then fuzzy), file paths, and imports. Returns grouped results. Can be combined with structured filters to narrow results to matching files."
cli_help        = "Search term — searches exports, files, and imports (smart ranking)"
cli_flag        = "term"

[[tools.fmm_search.params]]
name            = "export"
type            = "string"
mcp_description = "Find files exporting this symbol (exact match, then case-insensitive substring fallback)"
cli_help        = "Find file by export name (exact O(1) + fuzzy substring)"
cli_flag        = "--export"

[[tools.fmm_search.params]]
name            = "imports"
type            = "string"
mcp_description = "Find all files that import an external package (npm, pip, crate, etc.) — substring match on the import name. For local file paths (e.g. src/db/client), use depends_on instead."
cli_help        = "Find files that import an external package (use --depends-on for local paths)"
cli_flag        = "--imports"

[[tools.fmm_search.params]]
name            = "depends_on"
type            = "string"
mcp_description = "Find all files that transitively depend on this local path (full import chain, not just direct importers) — use for full blast radius before renaming. For direct-only importers, use fmm_dependency_graph with depth=1."
cli_help        = "Find files that depend on a path"
cli_flag        = "--depends-on"

[[tools.fmm_search.params]]
name            = "min_loc"
type            = "integer"
mcp_description = "Minimum lines of code — find files larger than this"
cli_help        = "Minimum lines of code"
cli_flag        = "--min-loc"

[[tools.fmm_search.params]]
name            = "max_loc"
type            = "integer"
mcp_description = "Maximum lines of code — find files smaller than this"
cli_help        = "Maximum lines of code"
cli_flag        = "--max-loc"

[[tools.fmm_search.params]]
name            = "limit"
type            = "integer"
mcp_description = "Maximum number of fuzzy export results (default: 50). Increase for broader searches."
cli_help        = "Maximum number of fuzzy export results (default: 50)"
cli_flag        = "--limit"

[tools.fmm_list_files]
cli_name        = "ls"
mcp_description = "List all indexed files under a directory prefix. The first tool to reach for when exploring an unknown module or package. Returns file paths with LOC, export count, and downstream dependent count. Default sort: LOC descending (largest files first). sort_by options: loc (default), name, exports, downstream (blast-radius sort), modified (most recently changed first). Default limit: 200. Use offset to page through large directories."
cli_about       = "List all files indexed by fmm under a directory prefix.\n\nShows file paths with LOC and export count.\n\nSort modes (--sort-by):\n- loc (default): heaviest files first\n- name: alphabetical\n- exports: most exported symbols first\n- downstream: most depended-upon files first (best for pre-refactoring blast radius)\n- modified: most recently changed first\n\nUse --group-by=subdir to collapse into directory buckets.\nUse --filter=source to exclude test files; --filter=tests for test files only."

[[tools.fmm_list_files.params]]
name            = "directory"
type            = "string"
mcp_description = "Directory prefix to filter files (e.g. 'src/cli/' or 'libs/agno/models'). Omit to list all indexed files."
cli_help        = "Directory prefix to filter (e.g. src/, packages/core/)"
cli_flag        = "directory"

[[tools.fmm_list_files.params]]
name            = "pattern"
type            = "string"
mcp_description = "Glob pattern to filter by filename within the directory (e.g. '*.py', '*.rs', 'test_*'). Supports * wildcard."
cli_help        = "Glob pattern to filter by filename (e.g. '*.ts', '*.rs', 'test_*')"
cli_flag        = "--pattern"

[[tools.fmm_list_files.params]]
name            = "limit"
type            = "integer"
mcp_description = "Maximum number of files to return (default: 200). Increase for broader listings."
cli_help        = "Maximum number of files to return (default: 200)"
cli_flag        = "--limit"

[[tools.fmm_list_files.params]]
name            = "offset"
type            = "integer"
mcp_description = "Number of files to skip before returning results (default: 0). Use for pagination: offset=200 returns files 201–400."
cli_help        = "Number of files to skip (default: 0) — use for pagination"
cli_flag        = "--offset"

[[tools.fmm_list_files.params]]
name            = "sort_by"
type            = "string"
enum            = ["name", "loc", "exports", "downstream", "modified"]
mcp_description = "Sort field. 'loc' (default): lines of code descending. 'name': alphabetical. 'exports': export count descending. 'downstream': direct dependent count descending (blast-radius sort — highest-risk files first). 'modified': most recently changed files first (date shown in output). 'loc', 'exports', 'downstream', and 'modified' default to descending order."
cli_help        = "Sort field: loc (default), name, exports, downstream, modified"
cli_flag        = "--sort-by"

[[tools.fmm_list_files.params]]
name            = "order"
type            = "string"
enum            = ["asc", "desc"]
mcp_description = "Sort order. Defaults: 'name' → asc, 'loc'/'exports'/'downstream' → desc. Explicit 'asc'/'desc' overrides the default."
cli_help        = "Sort order: asc or desc (default depends on sort-by)"
cli_flag        = "--order"

[[tools.fmm_list_files.params]]
name            = "group_by"
type            = "string"
enum            = ["subdir"]
mcp_description = "Collapse files into directory buckets. 'subdir': group by immediate subdirectory, showing file count and total LOC per bucket. Best for initial orientation of large codebases. sort_by applies to bucket-level LOC."
cli_help        = "Collapse files into directory buckets (subdir: group by immediate subdirectory)"
cli_flag        = "--group-by"

[[tools.fmm_list_files.params]]
name            = "filter"
type            = "string"
enum            = ["all", "source", "tests"]
mcp_description = "File type filter. 'all' (default): no filtering. 'source': exclude test files. 'tests': return only test files. Detection heuristic uses path segments (/test/, /e2e/, /__tests__/) and filename suffixes (.spec.ts, .test.ts, _test.go, etc.), configurable via test_patterns in .fmmrc.json."
cli_help        = "File type filter: all (default), source (exclude tests), tests (only tests)"
cli_flag        = "--filter"

[tools.fmm_glossary]
cli_name        = "glossary"
mcp_description = "Symbol-level impact analysis. Given a symbol name or pattern, returns all definitions and exactly which files import each one. Three-layer precision: bare name returns named-import filtered callers (Layer 2, default); dotted name (e.g. 'Injector.loadInstance') adds call-site precision; precision: 'call-site' adds Layer 3 tree-sitter to remove dead imports and annotate re-exports. Use before renaming or changing a signature."
cli_about       = "Symbol-level impact analysis.\n\nGiven a symbol name or pattern, shows every definition and exactly which files import it. Use before renaming a function or changing a signature to know precisely what breaks."

[[tools.fmm_glossary.params]]
name            = "pattern"
type            = "string"
required        = true
mcp_description = "Required. Case-insensitive substring filter on export name. Bare name (e.g. 'loadInstance') returns named-import filtered used_by (Layer 2). Dotted name (e.g. 'Injector.loadInstance') adds call-site precision, filtered to actual callers."
cli_help        = "Symbol name or substring pattern (case-insensitive)"
cli_flag        = "pattern"

[[tools.fmm_glossary.params]]
name            = "limit"
type            = "integer"
mcp_description = "Max entries returned (default 10, hard cap at 50). Use a specific pattern to stay under the default."
cli_help        = "Maximum number of entries returned (default: 10)"
cli_flag        = "--limit"

[[tools.fmm_glossary.params]]
name            = "mode"
type            = "string"
enum            = ["source", "tests", "all"]
mcp_description = "source (default): excludes test symbols and test files. tests: only test exports. all: unfiltered."
cli_help        = "Filter mode: source (default, no tests), tests (test coverage only), all (unfiltered)"
cli_flag        = "--mode"

[[tools.fmm_glossary.params]]
name            = "precision"
type            = "string"
enum            = ["named", "call-site"]
mcp_description = "named (default): Layer 2 only, fast index lookup with no file reads. call-site: adds Layer 3 tree-sitter verification to remove dead imports and annotate re-export-only files."
cli_help        = "Precision level: named (default, fast) or call-site (tree-sitter verification)"
cli_flag        = "--precision"
